<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Page Not Found | Klearvoy</title>
  <style>
    :root {
      color-scheme: light;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Roboto, sans-serif;
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fa;
      color: #1a1a1a;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 40px 28px;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }
    p {
      color: #4a4a4a;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      background: #00a8e8;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-weight: 600;
    }
    a:hover {
      background: #008bbf;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404 - Page Not Found</h1>
    <p>The page you are looking for does not exist or has moved. Please return to the homepage.</p>
    <a href="/">Back to Homepage</a>
  </main>
</body>
</html>
