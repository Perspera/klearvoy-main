name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic file sanity check
        run: |
          test -f index.htm
          test -f CNAME
          test -f README.md

      - name: Validate docs exist
        run: |
          test -f docs/requirements.md
          test -f docs/architecture.md
          test -f docs/development-process.md
          test -f docs/release-process.md

      - name: Run preflight check script
        shell: pwsh
        run: ./check.ps1
